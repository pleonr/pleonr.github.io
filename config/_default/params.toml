# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.ico"

[footer]
since = 2024
customText = ""

[dateFormat]
published = "Jan 08, 2024"
lastUpdated = "Jan 09, 2024 15:04 MST"

[sidebar]
emoji = ""
subtitle = ""

[sidebar.avatar]
enabled = true
local = true
src = "img/avatar.png"

[article]
math = false
readingTime = true

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

[defaultImage.opengraph]
enabled = false
local = false
src = ""

[colorScheme]
toggle = false
default = "dark"

[imageProcessing.cover]
enabled = true

[imageProcessing.content]
enabled = true

